function smooth(arr, w) {
  var out = [];
  for (var i=0; i<arr.length; i++) {
    var s=0, c=0;
    for (var j=Math.max(0,i-w+1); j<=Math.min(arr.length-1,i+w-1); j++) { s+=arr[j]; c++; }
    out.push(+(s/c).toFixed(2));
  }
  return out;
}
var liveMA5 = smooth(liveVals, 5);
var pigletMA5 = smooth(pigletVals, 5);
var liveAvg = +(liveVals.reduce(function(a,b){return a+b;},0)/liveVals.length).toFixed(1);

function findMarkCoords(kps, vals) {
  return kps.map(function(kp){
    var idx = dates.indexOf(kp.d);
    return idx>=0 ? {coord:[kp.d,vals[idx]],label:kp.label,type:kp.t} : null;
  }).filter(Boolean);
}

function makeTooltip(priceKey, momKey, yoyKey, priceLabel) {
  return function(params) {
    var idx = params[0].dataIndex;
    if (idx==null) return '';
    var r = DATA[idx];
    var mom = r[momKey], yoy = r[yoyKey];
    var mc = mom>=0?'#B84B31':'#1D39C4';
    var yc = yoy>=0?'#B84B31':'#1D39C4';
    var maKey = priceKey==='live_price'?'liveMA5':'pigletMA5';
    var maVals = priceKey==='live_price'?liveMA5:pigletMA5;
    return '<div style="font-weight:700;font-size:14px;margin-bottom:8px;font-family:\'Noto Serif SC\',serif;">'+r.date_display+'</div>'+
      '<table style="font-size:12px;border-collapse:collapse;">'+
      '<tr><td style="padding:2px 10px 2px 0;color:#736E67;">'+priceLabel+'</td><td style="padding:2px 0;font-weight:700;font-family:\'JetBrains Mono\',monospace;">'+r[priceKey]+' 元/kg</td></tr>'+
      '<tr><td style="padding:2px 10px 2px 0;color:#736E67;">5月均线</td><td style="padding:2px 0;font-family:\'JetBrains Mono\',monospace;color:#736E67;">'+maVals[idx]+' 元/kg</td></tr>'+
      '<tr><td style="padding:2px 10px 2px 0;color:#736E67;">环比</td><td style="padding:2px 0;font-weight:600;color:'+mc+';font-family:\'JetBrains Mono\',monospace;">'+(mom>=0?'+':'')+mom+'%</td></tr>'+
      '<tr><td style="padding:2px 10px 2px 0;color:#736E67;">同比</td><td style="padding:2px 0;font-weight:600;color:'+yc+';font-family:\'JetBrains Mono\',monospace;">'+(yoy>=0?'+':'')+yoy+'%</td></tr>'+
      '</table>';
  };
}

// ── Chart Builder ──
function buildChart(domId, vals, maVals, avg, phases, kps, color, priceKey, momKey, yoyKey, label, yMin, yMax) {
  var dom = document.getElementById(domId);
  if (!dom) return;
  var chart = echarts.init(dom);
  var peakCoords = findMarkCoords(kps.filter(function(k){return k.t==='peak';}), vals);
  var troughCoords = findMarkCoords(kps.filter(function(k){return k.t==='trough';}), vals);

  var option = {
    tooltip: { trigger:'axis', backgroundColor:'#F4F1EA', borderColor:'#E2DED6', borderWidth:1,
      padding:[12,16], textStyle:{color:'#2C2B29',fontSize:12},
      extraCssText:'box-shadow:0 4px 20px rgba(0,0,0,0.06);border-radius:6px;',
      formatter: makeTooltip(priceKey, momKey, yoyKey, label) },
    grid: { left:55, right:40, top:40, bottom:55 },
    xAxis: { type:'time', min:'2020-01-01', max:'2026-05-01',
      axisLine:{lineStyle:{color:'#E2DED6'}}, axisTick:{show:false},
      axisLabel:{color:'#736E67',fontSize:10,formatter:function(v){var d=new Date(v);return d.getFullYear()+'.'+('0'+(d.getMonth()+1)).slice(-2);}},
      splitLine:{show:false} },
    yAxis: { type:'value', name:'元 / 公斤',
      nameTextStyle:{color:'#736E67',fontSize:11,fontWeight:700},
      axisLabel:{color:'#736E67',fontSize:10,fontFamily:'JetBrains Mono,monospace'},
      axisLine:{show:false}, axisTick:{show:false},
      splitLine:{lineStyle:{color:'#E2DED6',type:'dashed',opacity:0.5}},
      min:yMin, max:yMax },
    dataZoom: [
      { type:'slider', bottom:8, height:18, borderColor:'#E2DED6',
        fillerColor:'rgba(184,75,49,0.06)', handleStyle:{color:'#B84B31'},
        dataBackground:{lineStyle:{color:'#B84B31'},areaStyle:{color:'rgba(184,75,49,0.04)'}},
        textStyle:{color:'#736E67',fontSize:9} },
      { type:'inside' }
    ],
    series: [
      { type:'line', name:'阶段', data:[], markArea:{ silent:true,
        label:{show:true,position:'insideTop',fontSize:10,color:'#736E67',fontWeight:500},
        data:makeMarkAreas(phases) }, z:0 },
      { type:'line', name:label, data:dates.map(function(d,i){return[d,vals[i]];}),
        lineStyle:{color:color,width:1.8}, itemStyle:{color:color},
        symbol:'circle', symbolSize:2, emphasis:{symbolSize:6,itemStyle:{borderWidth:2,borderColor:'#F4F1EA'}}, z:10 },
      { type:'line', name:'5月均线', data:dates.map(function(d,i){return[d,maVals[i]];}),
        lineStyle:{color:color,width:2.2,type:'dashed',opacity:0.35}, itemStyle:{color:color},
        symbol:'none', z:9 },
      { type:'line', name:'均值 '+avg, data:dates.map(function(d){return[d,avg];}),
        lineStyle:{color:'#BFBFBF',width:1,type:'dotted',opacity:0.7}, symbol:'none', z:1 },
      { type:'scatter', name:'价格峰', data:peakCoords.map(function(m){return m.coord;}),
        symbol:'pin', symbolSize:42, itemStyle:{color:'#B84B31'},
        label:{show:true,formatter:function(p){var m=peakCoords.find(function(x){return x.coord[0]===p.value[0];});return m?m.label:'';},
          position:'top',distance:10,fontSize:10,fontWeight:'bold',color:'#B84B31',
          backgroundColor:'#F4F1EA',padding:[3,5],borderRadius:4,borderColor:'#B84B31',borderWidth:1}, z:15 },
      { type:'scatter', name:'价格谷', data:troughCoords.map(function(m){return m.coord;}),
        symbol:'pin', symbolSize:42, itemStyle:{color:'#1D39C4'},
        label:{show:true,formatter:function(p){var m=troughCoords.find(function(x){return x.coord[0]===p.value[0];});return m?m.label:'';},
          position:'bottom',distance:10,fontSize:10,fontWeight:'bold',color:'#1D39C4',
          backgroundColor:'#F4F1EA',padding:[3,5],borderRadius:4,borderColor:'#1D39C4',borderWidth:1}, z:15 }
    ]
  };
  chart.setOption(option);
  window.addEventListener('resize',function(){chart.resize();});
}
